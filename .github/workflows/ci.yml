name: Elixir CI
# Define workflow that runs when changes are pushed to the
# `main` branch or pushed to a PR branch that targets the `main`
# branch.
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Sets the ENV `MIX_ENV` to `test` for running tests
env:
  MIX_ENV: test
  ADMIN_EMAIL: "some_email@example.com"
  CRAWL_AND_EXIT: false

# Default least-privilege permissions for all jobs. Jobs that need more
# (e.g. OIDC for AWS) grant it at the job level.
permissions:
  contents: read

jobs:
  zizmor:
    name: Run zizmor 🌈
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Required for upload-sarif (used by zizmor-action) to upload SARIF files.
      contents: read         # Only needed for private repos. Needed to clone the repo.
      actions: read          # Only needed for private repos. Needed for upload-sarif to read workflow run info.
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6

  # Build the code
  build:
    runs-on: ubuntu-latest
    name: Build
    steps:
      # Step: Check out the code.
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Step: Setup Elixir + Erlang image as the base.
      - name: Set up Elixir
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          version-file: .tool-versions
          version-type: strict

      # Step: Define how to cache deps. Restores existing cache if present.
      - name: Cache deps
        id: cache-deps
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        env:
          cache-name: cache-elixir-deps
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ env.cache-name }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.cache-name }}-

      # Step: Define how to cache the `_build` directory. After the first run,
      # this speeds up tests runs a lot. This includes not re-compiling our
      # project's downloaded deps every run.
      - name: Cache compiled build
        id: cache-build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        env:
          cache-name: cache-compiled-build
        with:
          path: _build
          key: ${{ runner.os }}-mix-${{ env.cache-name }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.cache-name }}-
            ${{ runner.os }}-mix-

      # Step: Download project dependencies. If unchanged, uses
      # the cached version.
      - name: Install dependencies
        run: |
          mix deps.get

      # Step: Compile the project treating any warnings as errors.
      # Customize this step if a different behavior is desired.
      - name: Compiles without warnings
        run: mix compile --warnings-as-errors

  # Dialyzer check
  dialyzer:
    runs-on: ubuntu-latest
    needs: build
    name: Dialyzer

    steps:
      # Step: Check out the code.
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Step: Setup Elixir + Erlang image as the base.
      - name: Set up Elixir
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          version-file: .tool-versions
          version-type: strict

      # Step: Grab deps from cache (as the deps cache is populated in the "build" job)
      - name: Cache deps
        id: cache-deps
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        env:
          cache-name: cache-elixir-deps
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ env.cache-name }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.cache-name }}-

      # Step: Grab the compiled build from the cache (as the build cache is populated in the "build" job)
      - name: Cache compiled build
        id: cache-build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        env:
          cache-name: cache-compiled-build
        with:
          path: _build
          key: ${{ runner.os }}-mix-${{ env.cache-name }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.cache-name }}-
            ${{ runner.os }}-mix-

      # Step: Grab the compiled build from the cache (as the build cache is populated in the "build" job)
      - name: Cache compiled build
        id: cache-dialyzer
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        env:
          cache-name: cache-dialyzer
        with:
          path: _dialyzer
          key: ${{ runner.os }}-dialyzer-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-Dialyzer-

      - name: Run Dialyzer
        run: MIX_ENV=dev mix dialyzer

  # Perform various auditing tasks such as checking formatting etc.
  audit:
    runs-on: ubuntu-latest
    needs: build
    name: Audit

    steps:
      # Step: Check out the code.
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Step: Setup Elixir + Erlang image as the base.
      - name: Set up Elixir
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          version-file: .tool-versions
          version-type: strict

      # Step: Grab deps from cache (as the deps cache is populated in the "build" job)
      - name: Cache deps
        id: cache-deps
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        env:
          cache-name: cache-elixir-deps
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ env.cache-name }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.cache-name }}-

      # Step: Grab the compiled build from the cache (as the build cache is populated in the "build" job)
      - name: Cache compiled build
        id: cache-build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        env:
          cache-name: cache-compiled-build
        with:
          path: _build
          key: ${{ runner.os }}-mix-${{ env.cache-name }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.cache-name }}-
            ${{ runner.os }}-mix-

      # Step: Check that the checked in code has already been formatted.
      # This step fails if something was found unformatted.
      - name: Check Formatting
        run: mix format --check-formatted
      # Step: Check for cycles, don't exceed 20
      - name: Check cycles
        run: mix xref graph --format cycles --fail-above 20
      # Step: Check for transitive compilation dependencies
      - name: Check for transitive compilation dependencies
        run: mix xref graph --label compile-connected --fail-above 1
      # Step: Run Credo checks
      - name: Run Credo
        run: mix credo --strict
        # Step: Check for any packages with known security issues
      - name: Check for dependency security vulnerabilities
        run: mix deps.audit --ignore-file .mix_audit_ignore
      # Step: Check for any retired packages
      - name: Check for retired packages
        run: mix hex.audit
      # Step: Check for un-used packages
      - name: Check for un-used packages
        run: mix deps.unlock --check-unused
      # Step: Run Sobelow
      - name: Check for Sobelow security vulnerabilities
        run: mix sobelow --config --exit low

  # Run the tests
  test:
    # Set up a Postgres DB service. By default, Phoenix applications
    # use Postgres. This creates a database for running tests.
    # Additional services can be defined here if required.
    services:
      db:
        image: postgres:12
        ports: ["5432:5432"]
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    runs-on: ubuntu-latest
    needs: build
    name: Test

    steps:
      # Step: Check out the code.
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Step: Setup Elixir + Erlang image as the base.
      - name: Set up Elixir
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          version-file: .tool-versions
          version-type: strict

      # Step: Grab deps from cache (as the deps cache is populated in the "build" job)
      - name: Cache deps
        id: cache-deps
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        env:
          cache-name: cache-elixir-deps
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ env.cache-name }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.cache-name }}-

      # Step: Grab the compiled build from the cache (as the build cache is populated in the "build" job)
      - name: Cache compiled build
        id: cache-build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        env:
          cache-name: cache-compiled-build
        with:
          path: _build
          key: ${{ runner.os }}-mix-${{ env.cache-name }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.cache-name }}-
            ${{ runner.os }}-mix-

      # Step: Execute the tests.
      - name: Run tests
        run: |
          mix ecto.create
          mix ecto.migrate
          mix coveralls

  # Deploy to Fly
  deploy_to_fly:
    runs-on: ubuntu-latest
    needs: [audit, test]
    name: Deploy to Fly
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_TO_FLY == 'true'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # 1.6
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          HOSTING_PLATFORM: "fly"

  # Deploy to Render
  setup_render_ws_deploy_matrix:
    runs-on: ubuntu-latest
    name: "Setup Render WS Matrix"
    needs: [audit, test]
    if: vars.DEPLOY_TO_RENDER == 'true'
    outputs:
      matrix: ${{ steps.setup_render_ws_deploy_matrix.outputs.matrix_output }}
    steps:
      - id: setup_render_ws_deploy_matrix
        uses: cschadewitz/dynamic-matrix-input@11ef22d593b07df75ad67ad270090b4cef96a0dc # v1.0.0
        with:
          matrix_input: ${{ vars.RENDER_ENVIRONMENTS }}

  setup_render_cron_deploy_matrix:
    runs-on: ubuntu-latest
    name: "Setup Render CRON Matrix"
    needs: [audit, test]
    if: vars.DEPLOY_TO_RENDER == 'true'
    outputs:
      matrix: ${{ steps.setup_render_cron_deploy_matrix.outputs.matrix_output }}
    steps:
      - id: setup_render_cron_deploy_matrix
        uses: cschadewitz/dynamic-matrix-input@11ef22d593b07df75ad67ad270090b4cef96a0dc # v1.0.0
        with:
          matrix_input: ${{ vars.RENDER_CRON_ENVIRONMENTS }}

  deploy_webservice_to_render:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: ${{ fromJson(needs.setup_render_ws_deploy_matrix.outputs.matrix) }}
    needs:
      - setup_render_ws_deploy_matrix
    name: "Deploy WS to Render"
    if: vars.DEPLOY_TO_RENDER == 'true'

    steps:
      - name: Extract service id
        id: extract
        env:
          ENVIRONMENT: ${{ matrix.environment }}
        run: |
          # Replace colon with a space, split into parts, and store as JSON
          PARTS=$(echo "$ENVIRONMENT" | sed 's/:/ /' | jq -R -s 'split(" ")')
          ENV_NAME=$(echo $PARTS | jq -r '.[0]')
          SRV_ID=$(echo $PARTS | jq -r '.[1]')

          # Write values to $GITHUB_ENV safely
          echo "ENV_NAME=$ENV_NAME" >> $GITHUB_ENV
          echo "SRV_ID=$SRV_ID" >> $GITHUB_ENV

      - name: Skip non-main branch for prod
        if: env.ENV_NAME == 'prod' && github.ref_name != 'main'
        run: echo "Skipping prod deployment because the branch is not main."
        continue-on-error: true

      - name: Deploy to Render
        if: env.ENV_NAME != 'prod' || github.ref_name == 'main'
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          set -euo pipefail

          # Trigger a deploy of the latest commit
          deploy_id=$(curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$SRV_ID/deploys" | jq -r '.id')

          if [ -z "$deploy_id" ] || [ "$deploy_id" = "null" ]; then
            echo "Failed to trigger deploy for service $SRV_ID"
            exit 1
          fi
          echo "Triggered deploy $deploy_id for service $SRV_ID"

          # Poll until terminal state (mirrors render-deploy-action wait-for-success)
          while true; do
            status=$(curl --silent --show-error \
              --header "Authorization: Bearer $RENDER_API_KEY" \
              --header "Accept: application/json" \
              "https://api.render.com/v1/services/$SRV_ID/deploys/$deploy_id" \
              | jq -r '.status // empty' || true)

            if [ -z "$status" ]; then
              echo "Could not read deploy status, retrying..."
              sleep 10
              continue
            fi
            echo "Deploy status: $status"

            case "$status" in
              live) echo "Deploy succeeded."; exit 0 ;;
              *failed | canceled | deactivated) echo "Deploy failed: $status"; exit 1 ;;
            esac
            sleep 10
          done

  deploy_cron_service_to_render:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: ${{ fromJson(needs.setup_render_cron_deploy_matrix.outputs.matrix) }}
    needs:
      - setup_render_cron_deploy_matrix
    name: "Deploy CRON to Render"
    if: vars.DEPLOY_TO_RENDER == 'true'

    steps:
      - name: Extract service id
        id: extract
        env:
          ENVIRONMENT: ${{ matrix.environment }}
        run: |
          # Replace colon with a space, split into parts, and store as JSON
          PARTS=$(echo "$ENVIRONMENT" | sed 's/:/ /' | jq -R -s 'split(" ")')
          ENV_NAME=$(echo $PARTS | jq -r '.[0]')
          SRV_ID=$(echo $PARTS | jq -r '.[1]')

          # Write values to $GITHUB_ENV safely
          echo "ENV_NAME=$ENV_NAME" >> $GITHUB_ENV
          echo "SRV_ID=$SRV_ID" >> $GITHUB_ENV

      - name: Skip non-main branch for prod
        if: env.ENV_NAME == 'prod' && github.ref_name != 'main'
        run: echo "Skipping prod deployment because the branch is not main."
        continue-on-error: true

      - name: Deploy to Render
        if: env.ENV_NAME != 'prod' || github.ref_name == 'main'
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          set -euo pipefail

          # Trigger a deploy of the latest commit
          deploy_id=$(curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/$SRV_ID/deploys" | jq -r '.id')

          if [ -z "$deploy_id" ] || [ "$deploy_id" = "null" ]; then
            echo "Failed to trigger deploy for service $SRV_ID"
            exit 1
          fi
          echo "Triggered deploy $deploy_id for service $SRV_ID"

          # Poll until terminal state (mirrors render-deploy-action wait-for-success)
          while true; do
            status=$(curl --silent --show-error \
              --header "Authorization: Bearer $RENDER_API_KEY" \
              --header "Accept: application/json" \
              "https://api.render.com/v1/services/$SRV_ID/deploys/$deploy_id" \
              | jq -r '.status // empty' || true)

            if [ -z "$status" ]; then
              echo "Could not read deploy status, retrying..."
              sleep 10
              continue
            fi
            echo "Deploy status: $status"

            case "$status" in
              live) echo "Deploy succeeded."; exit 0 ;;
              *failed | canceled | deactivated) echo "Deploy failed: $status"; exit 1 ;;
            esac
            sleep 10
          done

  # AWS specific steps
  build_and_push_to_ecr:
    runs-on: ubuntu-latest
    needs: [audit, test]
    name: "Build and Push Image to ECR"
    if: vars.DEPLOY_TO_AWS == 'true'
    permissions:
      id-token: write # Required for AWS OIDC role assumption
      contents: read
    outputs:
      aws_region: ${{ vars.AWS_REGION }}
      docker_image: ${{ steps.ecr-login.outputs.registry }}/${{ vars.AWS_ECR_REPO }}@${{ steps.docker-build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_BUILD_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to AWS repository
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6
        with:
          mask-password: "true"

      - name: Get branch name
        id: branch-name
        uses: tj-actions/branch-names@5250492686b253f06fa55861556d1027b067aeb5 # v9.0.2

      - name: Build image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ steps.ecr-login.outputs.registry }}/${{ vars.AWS_ECR_REPO }}
          # The release will be tagged with the branch and the short git sha (and latest if on main)
          tags: |
            type=sha,prefix=${{steps.branch-name.outputs.current_branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build, tag, and push to ECR
        id: docker-build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          # Replace this if the dockerfile is at a different path
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  setup_matrix:
    runs-on: ubuntu-latest
    name: "Setup AWS Matrix"
    needs: [audit, test, build_and_push_to_ecr]
    if: vars.DEPLOY_TO_AWS == 'true'
    outputs:
      matrix: ${{ steps.setup_matrix.outputs.matrix_output }}
    steps:
      - id: setup_matrix
        uses: cschadewitz/dynamic-matrix-input@11ef22d593b07df75ad67ad270090b4cef96a0dc # v1.0.0
        with:
          matrix_input: ${{ vars.AWS_ENVIRONMENTS }}

  deploy_to_aws:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: ${{ fromJson(needs.setup_matrix.outputs.matrix) }}
    env:
      DOCKER_IMAGE: ${{ needs.build_and_push_to_ecr.outputs.docker_image }}
    needs:
      - setup_matrix
      - build_and_push_to_ecr
    name: "Deploy to ECS"
    if: vars.DEPLOY_TO_AWS == 'true'
    permissions:
      id-token: write # Required for AWS OIDC role assumption
      contents: read
    steps:
      - name: Setup AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: "arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-ecs-${{vars.AWS_SERVICE_NAME_PREFIX}}-${{ matrix.environment }}"
          aws-region: ${{ vars.AWS_REGION }}

      - name: Skip non-main branch for prod
        if: matrix.environment == 'prod' && github.ref_name != 'main'
        run: echo "Skipping prod deployment because the branch is not main."
        continue-on-error: true

      # This will download the task definition template managed by Terraform
      # and modify the family and image attributes.
      - name: Build ECS task definition
        if: matrix.environment != 'prod' || github.ref_name == 'main'
        env:
          SERVICE_PREFIX: ${{ vars.AWS_SERVICE_NAME_PREFIX }}
          ENVIRONMENT: ${{ matrix.environment }}
        run: |
          aws ecs describe-task-definition --task-definition "${SERVICE_PREFIX}-${ENVIRONMENT}-template" --query taskDefinition > task-definition.json
          jq --arg family "${SERVICE_PREFIX}-${ENVIRONMENT}" --arg image "$DOCKER_IMAGE" \
            '.family=$family | .containerDefinitions[0].image=$image' \
            task-definition.json > task-definition.tmp.json
          mv task-definition.tmp.json task-definition.json

      - name: Build CodeDeploy app spec
        if: matrix.environment != 'prod' || github.ref_name == 'main'
        env:
          SERVICE_PREFIX: ${{ vars.AWS_SERVICE_NAME_PREFIX }}
          ENVIRONMENT: ${{ matrix.environment }}
        run: |
          cat <<SPEC >> apps-spec.yaml

          version: 1

          Resources:
            - TargetService:
                Type: AWS::ECS::Service
                Properties:
                  TaskDefinition: "Placeholder: GitHub Actions will fill this in"
                  LoadBalancerInfo:
                    ContainerName: "${SERVICE_PREFIX}-${ENVIRONMENT}"
                    ContainerPort: 4000
          SPEC

      - name: Deploy container
        if: matrix.environment != 'prod' || github.ref_name == 'main'
        uses: aws-actions/amazon-ecs-deploy-task-definition@a310a830f5c14e583e35d84e4e1ec7dd177c3c9c # v2.6.2
        with:
          task-definition: task-definition.json
          cluster: ${{vars.AWS_SERVICE_NAME_PREFIX}}-${{ matrix.environment }}
          service: ${{vars.AWS_SERVICE_NAME_PREFIX}}-${{ matrix.environment }}
          codedeploy-appspec: apps-spec.yaml
          codedeploy-application: ${{vars.AWS_SERVICE_NAME_PREFIX}}-${{ matrix.environment }}
          codedeploy-deployment-group: ${{vars.AWS_SERVICE_NAME_PREFIX}}-${{ matrix.environment }}
          wait-for-service-stability: true
