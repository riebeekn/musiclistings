value":"Due to the impact of the COVID-19 pandemic, our customer support team are handling a high volume of enquiries.\n\nThey are working with each event organiser to confirm the process for ticket holders once an event is cancelled or postponed. You may have already received information via email or through the event organiser’s social channels. Please be assured that as soon as we receive information about any changes made to your event, you will be contacted by RA or the promoter immediately.\n\nYou do not need to contact RA Ticket Support.\n\nYou should also check in your order history to see if the skip your refund tool is available for your order. To do this, head to the order in the “My Tickets” section and look out for the “Refund”, “Keep” or “Donate” buttons."}],"ShopFaq.EventCancelledOrPostponedDueToCovidQuestion":[{"type":0,"value":"The event I have tickets for has been cancelled or postponed due to the COVID-19 pandemic"}],"ShopFaq.FAQ":[{"type":0,"value":"FAQ"}],"ShopFaq.FAQs":[{"type":0,"value":"FAQ's"}],"ShopFaq.HowCanIPayForMyTicketsAnswer":[{"type":0,"value":"You can purchase tickets through our website or the "},{"children":[{"type":0,"value":"RA Guide"}],"type":8,"value":"raguide"},{"type":0,"value":" app for iOS.\n\nWe accept the following payment methods:\n- Visa\n- MasterCard\n- PayPal (available for all currencies except GBP)\n- Maestro (only available for GBP and EUR)\n- Apple Pay\n- iDEAL (participating Netherlands banks)\n\nWe do not accept American Express or Diners Club cards."}],"ShopFaq.HowCanIPayForMyTicketsQuestion":[{"type":0,"value":"How can I pay for my tickets?"}],"ShopFaq.HowDoIRemoveMyTicketFromTheResaleQueueAnswer":[{"type":0,"value":"You can remove tickets from the resale queue in the same way you added them. Go to "},{"children":[{"type":0,"value":"My Tickets"}],"type":8,"value":"mytickets"},{"type":0,"value":", click on the order in question and enter your RA password. You will see a \"Keep Ticket\" button which will remove your ticket from the resale queue when clicked."}],"ShopFaq.HowDoIRemoveMyTicketFromTheResaleQueueQuestion":[{"type":0,"value":"How do I remove my ticket from the resale queue?"}],"ShopFaq.HowDoIResellMyTicketAnswer":[{"type":0,"value":"RA Tickets has a resale service that allows you to securely sell your tickets to other users.\n\nIf you have a ticket that you no longer wish to use, go to "},{"children":[{"type":0,"value":"My Tickets"}],"type":8,"value":"mytickets"},{"type":0,"value":" and click on the order that you want to resell. Enter your RA password and then click \"Resell Ticket.\"\n\nWhen a ticket is resold through the queue, the original version becomes invalid, and our system generates a new ticket. You'll then receive a confirmation email and your money will be refunded. Tickets in the resale queue will only be available for purchase once the event is sold out.\n\nOnce entered into the resale queue, you will only be refunded if your ticket sells. Please note that we cannot guarantee that your ticket will sell.\n\nThe resale system may not be available for all events and its availability is at the discretion of the promoter. Posted tickets cannot be resold.\n\nYou will receive a refund equal to the amount that you paid for the ticket, minus the booking fee."}],"ShopFaq.HowDoIResellMyTicketQuestion":[{"type":0,"value":"How do I resell my ticket?"}],"ShopFaq.HowSecureIsMyPersonalInformationQuestionAnswer":[{"type":0,"value":"To make sure your information is absolutely secure, RA does not store your credit card details. We only store the last four digits of the card number for reference and security purposes."}],"ShopFaq.HowSecureIsMyPersonalInformationQuestionQuestion":[{"type":0,"value":"How secure is my personal information?"}],"ShopFaq.IHaveAlreadyOrderedTickets":[{"type":0,"value":"I have already ordered tickets"}],"ShopFaq.IHaveBeenGivenAPromoCodeHowDoIMakeUseOfThisAnswer":[{"type":0,"value":"There are 2 types of promo codes:\n- Promo codes that give you a discount\n- Promo codes that give you access to private tickets\n\nPromo codes are special URLs that take you to an RA event page. If the promo code offers a discount, that discount will be applied automatically when you go to checkout.\n\nIf the promo code links to private tickets, then the URL will reveal tickets that can't be seen by the general public."}],"ShopFaq.IHaveBeenGivenAPromoCodeHowDoIMakeUseOfThisQuestion":[{"type":0,"value":"I have been given a promo code. How do I make use of this?"}],"ShopFaq.IHaveOrderedAPostedTicketAndIveGivenTheWrongShippingAddressHowDoIChangeThisAddressAnswer":[{"type":0,"value":"Please contact us "},{"children":[{"type":0,"value":"here"}],"type":8,"value":"contactus"},{"type":0,"value":"."}],"ShopFaq.IHaveOrderedAPostedTicketAndIveGivenTheWrongShippingAddressHowDoIChangeThisAddressQuestion":[{"type":0,"value":"I have ordered a posted ticket and I’ve given the wrong shipping address. How do I change this address?"}],"ShopFaq.IHaveOrderedPostedTickets":[{"type":0,"value":"I have ordered posted tickets"}],"ShopFaq.IHaventReceivedMyPostedTicketWhereIsItAnswer":[{"type":0,"value":"We only send physical tickets by post to selected events in the UK. Posted tickets are sent at least seven days prior to the event. Depending on the event, posted tickets are either sent by Royal Mail 1st-class or Signed For 1st-class (you can check which applies to your ticket order on your "},{"children":[{"type":0,"value":"My Ticketss"}],"type":8,"value":"mytickets"},{"type":0,"value":").\n\nIf you have not received your ticket(s) three days before the event, then please "},{"children":[{"type":0,"value":"contact us"}],"type":8,"value":"contactus"},{"type":0,"value":" and we can arrange an alternative. Unfortunately, we cannot accept liability for missing tickets if you do not contact us within 48 hours of the event and refunds will not be available."}],"ShopFaq.IHaventReceivedMyPostedTicketWhereIsItQuestion":[{"type":0,"value":"I haven’t received my posted ticket. Where is it?"}],"ShopFaq.IStillNeedHelp":[{"type":0,"value":"I still need help."}],"ShopFaq.IStillNeedHelpQuestionAnswer":[{"type":0,"value":"Please contact us "},{"children":[{"type":0,"value":"here"}],"type":8,"value":"contactus"},{"type":0,"value":"."}],"ShopFaq.IWantARefund":[{"type":0,"value":"I want a refund"}],"ShopFaq.IWantToChangeTheNameOnMyTicketAnswer":[{"type":0,"value":"You can change the name on a ticket by downloading the "},{"children":[{"type":0,"value":"RA Guide"}],"type":8,"value":"raguide"},{"type":0,"value":" app. You might want to change the name on a ticket if the promoter requires ID for an event.\n\nTo change a name launch the RA Guide app and open a ticket. You can change the name of the ticket using the pencil icon. Please note, you can only change the name of a ticket once. You can't resell a ticket once you've changed a name."}],"ShopFaq.IWantToChangeTheNameOnMyTicketQuestion":[{"type":0,"value":"I want to change the name on my ticket"}],"ShopFaq.IWantToMakeAnOrder":[{"type":0,"value":"I want to make an order"}],"ShopFaq.IWantToUseTheResaleService":[{"type":0,"value":"I want to use the resale service"}],"ShopFaq.Intro":[{"type":0,"value":"Below you will find answers to the most common questions asked by RA\n    Ticket customers"}],"ShopFaq.MyTicketHasBeenResoldRefundedButMyPaymentCardHasBeenCancelledHowWillIReceivedMyRefundAnswer":[{"type":0,"value":"If you are using a debit card, refunds are returned directly to the bank account that was used for the initial payment. If this bank account has been closed, or if you used a credit card, then please contact us "},{"children":[{"type":0,"value":"here"}],"type":8,"value":"contactus"},{"type":0,"value":" and we can help you out."}],"ShopFaq.MyTicketHasBeenResoldRefundedButMyPaymentCardHasBeenCancelledHowWillIReceivedMyRefundQuestion":[{"type":0,"value":"My ticket has been resold / refunded but my payment card has been cancelled. How will I received my refund?"}],"ShopFaq.MyTicketHasNotResoldIsItStillValidForMeToUseAnswer":[{"type":0,"value":"Yes, you can still use your ticket at the event."}],"ShopFaq.MyTicketHasNotResoldIsItStillValidForMeToUseQuestion":[{"type":0,"value":"My ticket has not resold. Is it still valid for me to use?"}],"ShopFaq.MyTicketIsNotThere":[{"type":0,"value":"I’ve checked My Tickets but my ticket is not there. What do I do?"}],"ShopFaq.MyTicketIsNotThereAnswer":[{"type":0,"value":"You may have bought the ticket using a different user account. If so, you should check "},{"children":[{"type":0,"value":"My Tickets"}],"type":8,"value":"mytickets"},{"type":0,"value":" while logged into that user account. Here are some possibilities to consider:\n\n- Were you logged into a friend’s account when you made this purchase?\n\n- Do you have another email address? You may have created a separate user account with this address.\n\n- Did you log in with Facebook? You may have created a new RA account linked to Facebook and purchased tickets with that account. Try logging out and then logging in with Facebook."}],"ShopFaq.ShouldIBuyAnRaTicketFromSomeoneIDontKnowAnswer":[{"type":0,"value":"Please only buy RA tickets directly from RA. RA does not condone buying or selling of tickets privately or through the secondary market, unless you are making use of the official RA resale service. If the event has sold out then we'd recommend using our resale service."}],"ShopFaq.ShouldIBuyAnRaTicketFromSomeoneIDontKnowQuestion":[{"type":0,"value":"Should I buy an RA ticket from someone I don’t know?"}],"ShopFaq.TheEventIsSoldOutHowDoIPurchaseTicketsInTheResaleQueueAnswer":[{"type":0,"value":"When tickets are entered into the resale queue, they become available for purchase in exactly the same way as normal RA tickets. The ticket box near the top of the event page will light up and you will have the option to add tickets to your basket.\n\nWe recommend that you keep checking the event page to see if tickets have been made available."}],"ShopF
